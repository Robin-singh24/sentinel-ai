[alembic]
# Path relative to the directory from which `alembic` is invoked.
# Run alembic from: d:\Projects\Sentinel AI\backend\
script_location = app/database/migrations

# Prepend backend/ to sys.path so `from app.*` imports resolve correctly
# inside env.py when running migrations.
prepend_sys_path = .

# Migration file naming convention: date_revisionid_slug
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Store timestamps in UTC
timezone = UTC

# Alembic does not read sqlalchemy.url from here — it is constructed
# dynamically from environment variables inside env.py.
# sqlalchemy.url is intentionally left unset.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S
